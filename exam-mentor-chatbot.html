<html lang="en">
<head>

<style>
  :root{
    --navy: #16324F;
    --navy-deep: #0E2338;
    --paper: #F3EEE3;
    --paper-dark: #E7E0D0;
    --seal-red: #B23A2E;
    --pass-green: #2F6F4E;
    --ink: #2A2A28;
    --gold: #B08D57;
    --font-display: Georgia, 'Times New Roman', serif;
    --font-mono: 'Courier New', ui-monospace, Consolas, monospace;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  body{
    margin: 0;
    background: var(--navy-deep);
    font-family: var(--font-body);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 12px;
  }

  .app{
    width: 100%;
    max-width: 760px;
    background: var(--paper);
    border-radius: 6px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    overflow: hidden;
    border: 1px solid rgba(176,141,87,0.4);
  }

  /* ===== Letterhead ===== */
  .letterhead{
    background: var(--navy);
    color: var(--paper);
    padding: 18px 24px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-bottom: 3px solid var(--gold);
  }
  .letterhead h1{
    font-family: var(--font-display);
    font-size: 1.35rem;
    letter-spacing: 0.06em;
    margin: 0;
    text-transform: uppercase;
  }
  .letterhead p{
    margin: 2px 0 0;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    opacity: 0.75;
    text-transform: uppercase;
  }

  /* ===== Admit card strip ===== */
  .admit-strip{
    background: var(--paper);
    padding: 16px 24px 14px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  .field label{
    display: block;
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #6b6558;
    margin-bottom: 3px;
  }
  .field .value{
    font-family: var(--font-mono);
    font-size: 0.85rem;
    color: var(--ink);
  }
  .field.status .value{
    color: var(--pass-green);
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .live-dot{
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--pass-green);
    display: inline-block;
    animation: pulse 1.6s infinite;
  }
  @media (prefers-reduced-motion: reduce){ .live-dot{ animation: none; } }
  @keyframes pulse{
    0%,100%{ opacity: 1; }
    50%{ opacity: 0.35; }
  }

  /* ===== Perforation ===== */
  .perforation{
    height: 0;
    border-top: 2px dashed rgba(107,101,88,0.4);
    margin: 0 0;
    position: relative;
  }
  .perforation::before, .perforation::after{
    content: "";
    position: absolute;
    top: -9px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--navy-deep);
  }
  .perforation::before{ left: -9px; }
  .perforation::after{ right: -9px; }

  /* ===== Exam tabs ===== */
  .exam-tabs{
    display: flex;
    gap: 6px;
    padding: 14px 20px 6px;
    overflow-x: auto;
    background: var(--paper);
  }
  .exam-tab{
    flex: 0 0 auto;
    font-family: var(--font-body);
    font-size: 0.78rem;
    font-weight: 600;
    padding: 7px 14px;
    border-radius: 999px;
    border: 1px solid rgba(107,101,88,0.35);
    background: transparent;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .exam-tab:hover{ border-color: var(--gold); }
  .exam-tab.active{
    background: var(--navy);
    color: var(--paper);
    border-color: var(--navy);
  }
  .exam-tab:focus-visible, .chip:focus-visible, .send-btn:focus-visible, .chat-input:focus-visible{
    outline: 2px solid var(--seal-red);
    outline-offset: 2px;
  }

  /* ===== Chat window ===== */
  .chat-window{
    background:
      radial-gradient(rgba(107,101,88,0.05) 1px, transparent 1px) 0 0/14px 14px,
      var(--paper);
    height: 380px;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .msg{ display: flex; gap: 8px; max-width: 88%; }
  .msg.bot{ align-self: flex-start; }
  .msg.user{ align-self: flex-end; flex-direction: row-reverse; }

  .seal{
    flex: 0 0 auto;
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 2px double var(--seal-red);
    color: var(--seal-red);
    font-family: var(--font-mono);
    font-size: 0.6rem;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: rotate(-8deg);
    background: rgba(178,58,46,0.06);
  }

  .bubble{
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 0.88rem;
    line-height: 1.45;
    white-space: pre-wrap;
  }
  .msg.bot .bubble{
    background: #fff;
    border: 1px solid rgba(107,101,88,0.25);
    border-top-left-radius: 2px;
  }
  .msg.user .bubble{
    background: var(--navy);
    color: var(--paper);
    border-top-right-radius: 2px;
  }

  /* ===== Quick actions ===== */
  .quick-actions{
    display: flex;
    gap: 8px;
    padding: 10px 20px;
    overflow-x: auto;
    background: var(--paper-dark);
    border-top: 1px solid rgba(107,101,88,0.2);
  }
  .chip{
    flex: 0 0 auto;
    font-size: 0.75rem;
    padding: 6px 12px;
    border-radius: 999px;
    border: 1px solid var(--gold);
    background: #fff;
    color: var(--navy);
    cursor: pointer;
    white-space: nowrap;
  }
  .chip:hover{ background: var(--gold); color: #fff; }

  /* ===== Input bar ===== */
  .input-bar{
    display: flex;
    gap: 10px;
    padding: 14px 20px;
    background: var(--paper);
    border-top: 2px dashed rgba(107,101,88,0.4);
  }
  .chat-input{
    flex: 1;
    padding: 10px 14px;
    border-radius: 6px;
    border: 1px solid rgba(107,101,88,0.4);
    font-size: 0.88rem;
    font-family: var(--font-body);
  }
  .send-btn{
    font-family: var(--font-display);
    font-weight: bold;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-size: 0.78rem;
    padding: 10px 18px;
    border-radius: 6px;
    border: 1px dashed var(--seal-red);
    background: var(--seal-red);
    color: #fff;
    cursor: pointer;
  }
  .send-btn:hover{ background: #952f25; }

  @media (max-width: 560px){
    .admit-strip{ grid-template-columns: repeat(2, 1fr); }
    .letterhead h1{ font-size: 1.05rem; }
    .chat-window{ height: 320px; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="letterhead">
    <div>
      <h1>Exam Prep Mentor</h1>
      <p>AI guidance for your exam journey</p>
    </div>
  </div>

  <div class="admit-strip">
    <div class="field">
      <label>Candidate</label>
      <div class="value">Aspirant</div>
    </div>
    <div class="field">
      <label>Examination</label>
      <div class="value" id="examField">Banking</div>
    </div>
    <div class="field">
      <label>Session ID</label>
      <div class="value" id="sessionField">EPM-000000</div>
    </div>
    <div class="field status">
      <label>Status</label>
      <div class="value"><span class="live-dot"></span>Live</div>
    </div>
  </div>

  <div class="perforation"></div>

  <div class="exam-tabs" id="examTabs"></div>

  <div class="chat-window" id="chatWindow"></div>

  <div class="quick-actions" id="quickActions"></div>

  <div class="input-bar">
    <input type="text" class="chat-input" id="chatInput" placeholder="Ask about syllabus, pattern, cutoffs, study plans..." autocomplete="off">
    <button class="send-btn" id="sendBtn">Send</button>
  </div>
</div>

<script>
(function(){

  var KB = {
    banking: {
      label: "Banking",
      exams: "SBI PO/Clerk, IBPS PO/Clerk/RRB, RBI Grade B",
      syllabus: "Banking exams test five areas: Reasoning Ability, Quantitative Aptitude, English Language, General & Financial Awareness, and Computer Knowledge. Prelims covers the first three; Mains adds Financial Awareness and Computer Knowledge with tougher difficulty.",
      pattern: "Most banking exams run in three stages: Prelims (100 questions, 60 minutes, screening only), Mains (sectional timing, higher difficulty, counts toward final score), and for PO-level posts, an Interview or Group Discussion. Clerk-level posts usually skip the interview.",
      tips: "Build daily speed with timed sectional tests, keep a running note of current affairs for financial awareness, and target accuracy over volume in Quant since negative marking punishes guesses. Revise number series and simplification tricks weekly.",
      cutoff: "Cutoffs vary by post, category, and year, and shift with the difficulty of that year's paper. Treat last year's cutoff as a rough guide, not a target: aim to clear it by a comfortable margin rather than exactly meeting it."
    },
    railway: {
      label: "Railway",
      exams: "RRB NTPC, RRB Group D, RRB ALP",
      syllabus: "Railway exams cover Mathematics, General Intelligence & Reasoning, General Science, and General Awareness & Current Affairs. ALP posts add a Technical Ability paper based on the trade you choose.",
      pattern: "The typical path is CBT 1 (screening), CBT 2 (main, harder and more detailed), followed by a Typing Test, Skill Test, or Physical Efficiency Test depending on the post, and finally Document Verification.",
      tips: "General Science carries real weight here, so revise Class 9-10 NCERT science alongside daily current affairs. Practice PET drills early if your post requires one, since physical fitness needs lead time to build.",
      cutoff: "RRB cutoffs are zone-wise and post-wise, so compare against your specific zone's past results rather than an all-India figure. Competition is high, so aim well above the previous cycle's cutoff."
    },
    upsc: {
      label: "UPSC",
      exams: "Civil Services Examination (IAS, IPS, IFS and allied services)",
      syllabus: "Prelims has two papers: General Studies Paper 1 (history, geography, polity, economy, environment, science, current affairs) and CSAT Paper 2 (qualifying, comprehension and reasoning). Mains has 9 papers including Essay, four GS papers, two Optional subject papers, and qualifying language papers.",
      pattern: "This is a long single-year cycle: Prelims (screening only, marks not counted further), Mains (written, marks count), and a Personality Test interview. Total preparation typically spans 10-12 months for a serious first attempt.",
      tips: "Build a strong NCERT foundation for Class 6-12 before moving to standard reference books. Read one newspaper daily for current affairs, and start answer-writing practice at least 4-5 months before Mains, not just before the exam.",
      cutoff: "Prelims cutoffs shift year to year based on paper difficulty and vacancies, typically in a moderate range out of 200 marks for General category. Mains and final cutoffs vary far more by optional subject and category, so track your target service's specific trend."
    },
    ssc: {
      label: "SSC",
      exams: "SSC CGL, SSC CHSL, SSC MTS",
      syllabus: "Core sections are Quantitative Aptitude, General Intelligence & Reasoning, English Comprehension, and General Awareness. CGL Tier 2 adds Statistics or General Studies (Finance & Economics) for specific posts.",
      pattern: "CGL runs Tier 1 (screening) then Tier 2 (main, now includes multiple sessions covering different skill papers), plus Document Verification and Skill Test for some posts. CHSL follows a similar Tier 1 and Tier 2 structure with a typing test for certain posts.",
      tips: "General Awareness rewards consistent daily reading more than last-minute cramming, so start early. Drill previous-year Quant and Reasoning questions to learn the recurring question patterns SSC reuses across years.",
      cutoff: "SSC releases category-wise and post-wise cutoffs after each tier. They tend to rise slightly year over year as competition increases, so treat the most recent cycle's numbers as your working target."
    },
    jee: {
      label: "JEE",
      exams: "JEE Main, JEE Advanced",
      syllabus: "Physics, Chemistry, and Mathematics from the Class 11-12 NCERT curriculum, with JEE Advanced demanding deeper conceptual application and multi-step problem solving beyond what Main tests.",
      pattern: "JEE Main runs across two sessions (January and April), computer-based, with the better score counting. Only top percentile scorers qualify for JEE Advanced, which decides admission to the IITs; JEE Main alone feeds NITs and IIITs.",
      tips: "Master NCERT thoroughly before jumping to advanced problem sets, since a large share of Main questions stay close to NCERT concepts. Keep a formula revision sheet per chapter and solve full-length mocks under strict timing.",
      cutoff: "JEE Main qualifying percentiles for JEE Advanced eligibility shift each year with the number of candidates and paper difficulty. NIT/IIIT admission cutoffs (via JoSAA) vary further by branch, institute, and category."
    },
    neet: {
      label: "NEET",
      exams: "NEET UG (Medical & Dental admissions)",
      syllabus: "Physics, Chemistry, and Biology (Botany and Zoology combined), drawn from the Class 11-12 NCERT syllabus, with Biology carrying the largest share of total marks.",
      pattern: "A single exam of 200 questions across all subjects, of which you attempt 180, in 3 hours 20 minutes. Each correct answer scores +4, each wrong answer costs -1, so unfamiliar guessing carries real risk.",
      tips: "Since Biology holds the most weight, prioritize NCERT line-by-line for Botany and Zoology. In Physics and Chemistry, build a bank of solved numericals and revisit diagrams and reactions regularly rather than only reading theory.",
      cutoff: "NEET qualifying percentiles and All India Rank cutoffs for specific colleges shift yearly with paper difficulty and seat availability. Government college cutoffs are typically far higher than private college cutoffs in the same state."
    }
  };

  var examOrder = ["banking","railway","upsc","ssc","jee","neet"];
  var currentExam = "banking";

  var quotes = [
    "Every topic you revise today is one less thing standing between you and your rank.",
    "Consistency beats intensity. An hour a day, every day, outperforms a weekend cram session.",
    "Mistakes in a mock test are cheap. Mistakes on exam day are expensive. Make them now.",
    "You don't need to feel ready. You need to show up and do the next question.",
    "Lakhs of aspirants started exactly where you are. The difference is who kept going after a bad week.",
    "Your syllabus doesn't care how you feel today. Open the book anyway, even for 20 minutes."
  ];

  function el(tag, cls, text){
    var e = document.createElement(tag);
    if(cls) e.className = cls;
    if(text !== undefined) e.textContent = text;
    return e;
  }

  function genSessionId(){
    var chars = "ABCDEFGHJKLMNPQRSTUVWXYZ0123456789";
    var s = "";
    for(var i=0;i<6;i++){ s += chars[Math.floor(Math.random()*chars.length)]; }
    return "EPM-" + s;
  }

  function buildTabs(){
    var wrap = document.getElementById("examTabs");
    wrap.innerHTML = "";
    examOrder.forEach(function(key){
      var btn = el("button", "exam-tab", KB[key].label);
      btn.setAttribute("data-key", key);
      if(key === currentExam) btn.classList.add("active");
      btn.addEventListener("click", function(){
        currentExam = key;
        document.getElementById("examField").textContent = KB[key].label;
        buildTabs();
        addBotMessage("Switched to " + KB[key].label + ". Covers " + KB[key].exams + ". Ask about syllabus, exam pattern, tips, cutoffs, or a study plan.");
      });
      wrap.appendChild(btn);
    });
  }

  function buildQuickActions(){
    var wrap = document.getElementById("quickActions");
    wrap.innerHTML = "";
    var actions = [
      ["Syllabus", "What's the syllabus?"],
      ["Exam Pattern", "What's the exam pattern?"],
      ["Tips", "Give me preparation tips"],
      ["Cutoffs", "What about cutoffs?"],
      ["Study Plan", "Make me a study plan for 8 weeks"],
      ["Motivate Me", "I need motivation"]
    ];
    actions.forEach(function(a){
      var chip = el("chip".replace("chip","button"), "chip", a[0]);
      chip.addEventListener("click", function(){ sendMessage(a[1]); });
      wrap.appendChild(chip);
    });
  }

  function scrollToBottom(){
    var win = document.getElementById("chatWindow");
    win.scrollTop = win.scrollHeight;
  }

  function addMessage(text, sender){
    var win = document.getElementById("chatWindow");
    var msg = el("div", "msg " + sender);
    if(sender === "bot"){
      var seal = el("div", "seal", "AI");
      msg.appendChild(seal);
    }
    var bubble = el("div", "bubble", text);
    msg.appendChild(bubble);
    win.appendChild(msg);
    scrollToBottom();
  }

  function addBotMessage(text){ addMessage(text, "bot"); }
  function addUserMessage(text){ addMessage(text, "user"); }

  function matches(text, keywords){
    for(var i=0;i<keywords.length;i++){
      if(text.indexOf(keywords[i]) !== -1) return true;
    }
    return false;
  }

  function detectExamMention(text){
    for(var i=0;i<examOrder.length;i++){
      var key = examOrder[i];
      if(text.indexOf(key) !== -1) return key;
    }
    if(text.indexOf("bank") !== -1) return "banking";
    if(text.indexOf("rail") !== -1 || text.indexOf("rrb") !== -1) return "railway";
    if(text.indexOf("civil service") !== -1 || text.indexOf("ias") !== -1) return "upsc";
    if(text.indexOf("cgl") !== -1 || text.indexOf("chsl") !== -1) return "ssc";
    return null;
  }

  function buildStudyPlan(weeks, exam){
    var kb = KB[exam];
    var phases = [];
    var w = weeks;
    var foundation = Math.max(1, Math.round(w * 0.4));
    var practice = Math.max(1, Math.round(w * 0.35));
    var revision = Math.max(1, w - foundation - practice);
    phases.push("Weeks 1-" + foundation + ": Build foundation. Cover core " + kb.label + " topics end to end at least once, focusing on concepts over speed.");
    phases.push("Weeks " + (foundation+1) + "-" + (foundation+practice) + ": Practice phase. Daily sectional tests plus 2-3 full mocks a week, reviewing every wrong answer.");
    phases.push("Weeks " + (foundation+practice+1) + "-" + w + ": Revision phase. Rework your error log, revise formulas and current affairs, and taper mock frequency in the final few days.");
    return "Here's a " + w + "-week plan for " + kb.label + ":\n\n" + phases.join("\n\n");
  }

  function respond(rawText){
    var text = rawText.toLowerCase().trim();

    if(text === "") return "Type a question about syllabus, exam pattern, tips, cutoffs, or a study plan, and I'll help.";

    if(matches(text, ["hi","hello","hey"]) && text.length < 20){
      return "Hello. I'm set to " + KB[currentExam].label + " right now. Ask me about syllabus, exam pattern, prep tips, cutoffs, or a study plan, or switch exams using the tabs above.";
    }

    if(matches(text, ["thank"])){
      return "Happy to help. Keep going, one topic at a time.";
    }

    if(matches(text, ["what can you do","help me","how does this work"])){
      return "I can walk you through syllabus, exam pattern, prep tips, and cutoff trends for Banking, Railway, UPSC, SSC, JEE, and NEET. I can also sketch a study plan if you tell me how many weeks you have, or send a bit of motivation if you need it.";
    }

    var mentionedExam = detectExamMention(text);
    var exam = mentionedExam || currentExam;
    var kb = KB[exam];

    if(matches(text, ["motivat","demotivat","tired","giving up","stressed","anxious","exhausted","burnt out","burnout"])){
      return quotes[Math.floor(Math.random()*quotes.length)];
    }

    if(matches(text, ["study plan","schedule","timetable","plan for"])){
      var num = text.match(/\d+/);
      var unit = text.indexOf("day") !== -1 && text.indexOf("week") === -1 ? "days" : "weeks";
      if(!num){
        return "Tell me how many weeks you have left (for example, \"study plan for 8 weeks\") and I'll sketch a phase-by-phase plan for " + kb.label + ".";
      }
      var n = parseInt(num[0], 10);
      var weeks = unit === "days" ? Math.max(1, Math.round(n/7)) : n;
      return buildStudyPlan(weeks, exam);
    }

    if(matches(text, ["syllabus","topics","subjects","what to study","what should i study"])){
      return kb.syllabus;
    }

    if(matches(text, ["pattern","stages","structure","marking scheme","sections","how many papers","exam format"])){
      return kb.pattern;
    }

    if(matches(text, ["cutoff","cut off","score needed","previous year cutoff"])){
      return kb.cutoff;
    }

    if(matches(text, ["tip","how to prepare","strategy","crack","advice","how do i prepare"])){
      return kb.tips;
    }

    if(mentionedExam && mentionedExam !== currentExam){
      currentExam = mentionedExam;
      document.getElementById("examField").textContent = KB[mentionedExam].label;
      buildTabs();
      return "Switched to " + kb.label + " (covers " + kb.exams + "). Ask about syllabus, exam pattern, tips, cutoffs, or a study plan.";
    }

    return "I can help with syllabus, exam pattern, prep tips, cutoffs, or a study plan for " + kb.label + ". Try one of the quick-action chips below, or ask directly.";
  }

  function sendMessage(text){
    if(!text) return;
    addUserMessage(text);
    var reply = respond(text);
    setTimeout(function(){ addBotMessage(reply); }, 250);
  }

  document.getElementById("sendBtn").addEventListener("click", function(){
    var input = document.getElementById("chatInput");
    var text = input.value.trim();
    if(text === "") return;
    sendMessage(text);
    input.value = "";
  });

  document.getElementById("chatInput").addEventListener("keydown", function(e){
    if(e.key === "Enter"){
      document.getElementById("sendBtn").click();
    }
  });

  document.getElementById("sessionField").textContent = genSessionId();
  buildTabs();
  buildQuickActions();
  addBotMessage("Welcome. I'm your exam prep mentor, currently set to Banking (SBI PO/Clerk, IBPS PO/Clerk/RRB, RBI Grade B). Switch exams with the tabs above, or ask about syllabus, exam pattern, tips, cutoffs, or a study plan.");

})();
</script>
