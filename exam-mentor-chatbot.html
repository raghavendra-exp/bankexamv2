<html lang="en">

<style>
*,*::before,*::after{box-sizing:border-box}
:root{
  --d1:#050912;--d2:#0A1120;--d3:#111B2E;
  --pr:#4F46E5;--pr2:#6366F1;--pr3:#818CF8;
  --cy:#06B6D4;--cy2:#22D3EE;
  --gr:#10B981;--gr2:#34D399;
  --ac:#F59E0B;--rd:#EF4444;
  --panel:#0D1524;--panel2:#111C30;
  --bdr:rgba(255,255,255,.08);
  --txt:#F1F5F9;--txt2:#94A3B8;--txt3:#64748B;
  --bubble-bot:#151F33;--bubble-user:linear-gradient(135deg,var(--pr),var(--cy));
  --font-body:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --font-mono:ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;
}
html,body{margin:0;height:100%}
body{
  background:radial-gradient(ellipse 80% 60% at 50% 0%,#111B33,var(--d1) 70%);
  font-family:var(--font-body);color:var(--txt);
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px 12px;
}

/* ===== App shell ===== */
.app{
  width:100%;max-width:460px;height:min(820px,92vh);
  background:var(--panel);border-radius:22px;
  box-shadow:0 30px 80px rgba(0,0,0,.55),0 0 0 1px var(--bdr);
  overflow:hidden;display:flex;flex-direction:column;
  position:relative;
}

/* ===== Header ===== */
.chat-header{
  background:linear-gradient(160deg,var(--d1),var(--d3));
  padding:16px 18px 14px;border-bottom:1px solid var(--bdr);
  flex-shrink:0;position:relative;
}
.chat-header::after{
  content:"";position:absolute;left:0;right:0;bottom:-1px;height:1px;
  background:linear-gradient(90deg,transparent,var(--pr3),var(--cy2),transparent);opacity:.5;
}
.ch-top{display:flex;align-items:center;gap:12px}
.ch-avatar{
  width:42px;height:42px;border-radius:13px;flex-shrink:0;
  background:linear-gradient(135deg,var(--pr),var(--cy));
  display:flex;align-items:center;justify-content:center;font-size:20px;
  box-shadow:0 0 18px rgba(79,70,229,.5);
}
.ch-title{flex:1;min-width:0}
.ch-title h1{font-size:15px;font-weight:800;color:#fff;letter-spacing:-.2px}
.ch-status{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--gr2);font-weight:600;margin-top:1px}
.ch-status .live-dot{width:6px;height:6px;border-radius:50%;background:var(--gr2);box-shadow:0 0 6px var(--gr2);animation:blink 1.6s infinite;display:inline-block}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}
.ch-session{
  font-family:var(--font-mono);font-size:9.5px;color:var(--txt3);
  padding:4px 9px;border:1px solid var(--bdr);border-radius:14px;white-space:nowrap;
}

/* Exam tabs — segmented pill row */
.exam-tabs{display:flex;gap:6px;overflow-x:auto;padding-top:12px;scrollbar-width:none}
.exam-tabs::-webkit-scrollbar{display:none}
.exam-tab{
  flex:0 0 auto;padding:7px 14px;border-radius:20px;
  background:rgba(255,255,255,.05);border:1px solid var(--bdr);
  color:var(--txt2);font-size:12px;font-weight:700;cursor:pointer;
  transition:all .15s;font-family:inherit;white-space:nowrap;
}
.exam-tab:hover{background:rgba(255,255,255,.09);color:#fff}
.exam-tab.active{
  background:linear-gradient(135deg,var(--pr),var(--cy));color:#fff;border-color:transparent;
  box-shadow:0 2px 12px rgba(79,70,229,.4);
}
.exam-tab:focus-visible,.chip:focus-visible,.send-btn:focus-visible,.chat-input:focus-visible{
  outline:2px solid var(--cy2);outline-offset:1px;
}

/* ===== Chat window ===== */
.chat-window{
  flex:1;overflow-y:auto;padding:18px 16px;
  display:flex;flex-direction:column;gap:14px;
  background:
    radial-gradient(rgba(79,70,229,.05) 1px,transparent 1px) 0 0/26px 26px,
    var(--d2);
}
.chat-window::-webkit-scrollbar{width:5px}
.chat-window::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:10px}

.msg{display:flex;gap:9px;align-items:flex-end;max-width:88%}
.msg.bot{align-self:flex-start}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.seal{
  width:26px;height:26px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,var(--pr),var(--cy));
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:900;color:#fff;
}

.bubble{
  padding:11px 14px;border-radius:16px;font-size:13.5px;line-height:1.55;
  white-space:pre-wrap;word-wrap:break-word;
}
.msg.bot .bubble{
  background:var(--bubble-bot);color:var(--txt);
  border:1px solid var(--bdr);border-bottom-left-radius:4px;
}
.msg.user .bubble{
  background:var(--bubble-user);color:#fff;
  border-bottom-right-radius:4px;box-shadow:0 4px 16px rgba(79,70,229,.3);
}

/* ===== Typing / searching indicator ===== */
.typing-bubble{
  display:flex;align-items:center;gap:8px;
  background:var(--bubble-bot);border:1px solid var(--bdr);
  border-bottom-left-radius:4px;padding:11px 14px;border-radius:16px;
  font-size:12px;color:var(--txt2);
}
.typing-dots{display:inline-flex;gap:3px}
.typing-dots span{
  width:5px;height:5px;border-radius:50%;background:var(--gr2);
  animation:tdot 1.1s infinite ease-in-out;
}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes tdot{0%,80%,100%{opacity:.25;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* ===== Live web search results ===== */
.live-wire{
  background:var(--panel2);border:1px solid rgba(52,211,153,.25);
  border-bottom-left-radius:4px;border-radius:16px;overflow:hidden;font-size:13px;
  box-shadow:0 4px 20px rgba(16,185,129,.08);
}
.lw-head{
  background:linear-gradient(135deg,rgba(16,185,129,.18),rgba(6,182,212,.1));
  color:var(--gr2);padding:9px 14px;font-family:var(--font-mono);
  font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;
  display:flex;align-items:center;gap:7px;border-bottom:1px solid rgba(52,211,153,.2);
}
.lw-head .live-dot{background:var(--rd);box-shadow:0 0 6px var(--rd)}
.lw-list{padding:4px 0}
.lw-card{
  display:block;padding:10px 14px;text-decoration:none;color:var(--txt);
  border-bottom:1px solid rgba(255,255,255,.05);transition:background .12s;
}
.lw-card:last-child{border-bottom:none}
.lw-card:hover{background:rgba(52,211,153,.06)}
.lw-title{font-weight:700;font-size:13px;color:#fff;line-height:1.4;margin-bottom:3px}
.lw-meta{font-family:var(--font-mono);font-size:10px;color:var(--txt3);display:flex;gap:8px;align-items:center}
.lw-src{text-transform:uppercase;letter-spacing:.04em;color:var(--cy2)}
.lw-foot{
  padding:8px 14px;font-size:10px;color:var(--txt3);
  background:rgba(255,255,255,.02);border-top:1px solid rgba(255,255,255,.05);
}

/* ===== Quick actions ===== */
.quick-actions{
  display:flex;gap:7px;padding:10px 14px;overflow-x:auto;
  background:var(--panel2);border-top:1px solid var(--bdr);scrollbar-width:none;flex-shrink:0;
}
.quick-actions::-webkit-scrollbar{display:none}
.chip{
  flex:0 0 auto;font-size:11.5px;font-weight:700;padding:7px 13px;
  border-radius:20px;border:1px solid var(--bdr);background:rgba(255,255,255,.04);
  color:var(--txt2);cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit;
}
.chip:hover{background:rgba(255,255,255,.09);color:#fff;border-color:rgba(255,255,255,.18)}
.chip.chip-live{
  border-color:rgba(239,68,68,.4);color:#FCA5A5;background:rgba(239,68,68,.08);font-weight:800;
}
.chip.chip-live:hover{background:rgba(239,68,68,.18);color:#fff}

/* ===== Input bar ===== */
.input-bar{
  display:flex;gap:9px;padding:12px 14px;
  background:var(--panel2);border-top:1px solid var(--bdr);flex-shrink:0;
}
.chat-input{
  flex:1;padding:11px 16px;border-radius:24px;
  border:1px solid var(--bdr);background:rgba(255,255,255,.05);
  color:var(--txt);font-size:13.5px;font-family:var(--font-body);
}
.chat-input::placeholder{color:var(--txt3)}
.chat-input:focus{border-color:var(--pr3);background:rgba(255,255,255,.08)}
.send-btn{
  width:42px;height:42px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--pr),var(--cy));
  border:none;color:#fff;cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(79,70,229,.45);transition:transform .15s;
}
.send-btn:hover{transform:scale(1.07)}
.send-btn:active{transform:scale(.95)}

@media (max-width:480px){
  body{padding:0}
  .app{max-width:100%;height:100vh;border-radius:0}
}
</style>
</head>
<body>

<div class="app">

  <div class="chat-header">
    <div class="ch-top">
      <div class="ch-avatar">&#x1F393;</div>
      <div class="ch-title">
        <h1>Exam Prep Mentor</h1>
        <div class="ch-status"><span class="live-dot"></span>Live &middot; <span id="examField">Banking</span> &middot; Web Search On</div>
      </div>
      <div class="ch-session" id="sessionField">EPM-000000</div>
    </div>
    <div class="exam-tabs" id="examTabs"></div>
  </div>

  <div class="chat-window" id="chatWindow"></div>

  <div class="quick-actions" id="quickActions"></div>

  <div class="input-bar">
    <input type="text" class="chat-input" id="chatInput" placeholder="Ask about syllabus, pattern, cutoffs, latest news..." autocomplete="off">
    <button class="send-btn" id="sendBtn" aria-label="Send">&#x27A4;</button>
  </div>

</div>

<script>
(function(){

  var KB = {
    banking: {
      label: "Banking",
      exams: "SBI PO/Clerk, IBPS PO/Clerk/RRB, RBI Grade B",
      syllabus: "Banking exams test five areas: Reasoning Ability, Quantitative Aptitude, English Language, General & Financial Awareness, and Computer Knowledge. Prelims covers the first three; Mains adds Financial Awareness and Computer Knowledge with tougher difficulty.",
      pattern: "Most banking exams run in three stages: Prelims (100 questions, 60 minutes, screening only), Mains (sectional timing, higher difficulty, counts toward final score), and for PO-level posts, an Interview or Group Discussion. Clerk-level posts usually skip the interview.",
      tips: "Build daily speed with timed sectional tests, keep a running note of current affairs for financial awareness, and target accuracy over volume in Quant since negative marking punishes guesses. Revise number series and simplification tricks weekly.",
      cutoff: "Cutoffs vary by post, category, and year, and shift with the difficulty of that year's paper. Treat last year's cutoff as a rough guide, not a target: aim to clear it by a comfortable margin rather than exactly meeting it."
    },
    railway: {
      label: "Railway",
      exams: "RRB NTPC, RRB Group D, RRB ALP",
      syllabus: "Railway exams cover Mathematics, General Intelligence & Reasoning, General Science, and General Awareness & Current Affairs. ALP posts add a Technical Ability paper based on the trade you choose.",
      pattern: "The typical path is CBT 1 (screening), CBT 2 (main, harder and more detailed), followed by a Typing Test, Skill Test, or Physical Efficiency Test depending on the post, and finally Document Verification.",
      tips: "General Science carries real weight here, so revise Class 9-10 NCERT science alongside daily current affairs. Practice PET drills early if your post requires one, since physical fitness needs lead time to build.",
      cutoff: "RRB cutoffs are zone-wise and post-wise, so compare against your specific zone's past results rather than an all-India figure. Competition is high, so aim well above the previous cycle's cutoff."
    },
    upsc: {
      label: "UPSC",
      exams: "Civil Services Examination (IAS, IPS, IFS and allied services)",
      syllabus: "Prelims has two papers: General Studies Paper 1 (history, geography, polity, economy, environment, science, current affairs) and CSAT Paper 2 (qualifying, comprehension and reasoning). Mains has 9 papers including Essay, four GS papers, two Optional subject papers, and qualifying language papers.",
      pattern: "This is a long single-year cycle: Prelims (screening only, marks not counted further), Mains (written, marks count), and a Personality Test interview. Total preparation typically spans 10-12 months for a serious first attempt.",
      tips: "Build a strong NCERT foundation for Class 6-12 before moving to standard reference books. Read one newspaper daily for current affairs, and start answer-writing practice at least 4-5 months before Mains, not just before the exam.",
      cutoff: "Prelims cutoffs shift year to year based on paper difficulty and vacancies, typically in a moderate range out of 200 marks for General category. Mains and final cutoffs vary far more by optional subject and category, so track your target service's specific trend."
    },
    ssc: {
      label: "SSC",
      exams: "SSC CGL, SSC CHSL, SSC MTS",
      syllabus: "Core sections are Quantitative Aptitude, General Intelligence & Reasoning, English Comprehension, and General Awareness. CGL Tier 2 adds Statistics or General Studies (Finance & Economics) for specific posts.",
      pattern: "CGL runs Tier 1 (screening) then Tier 2 (main, now includes multiple sessions covering different skill papers), plus Document Verification and Skill Test for some posts. CHSL follows a similar Tier 1 and Tier 2 structure with a typing test for certain posts.",
      tips: "General Awareness rewards consistent daily reading more than last-minute cramming, so start early. Drill previous-year Quant and Reasoning questions to learn the recurring question patterns SSC reuses across years.",
      cutoff: "SSC releases category-wise and post-wise cutoffs after each tier. They tend to rise slightly year over year as competition increases, so treat the most recent cycle's numbers as your working target."
    },
    jee: {
      label: "JEE",
      exams: "JEE Main, JEE Advanced",
      syllabus: "Physics, Chemistry, and Mathematics from the Class 11-12 NCERT curriculum, with JEE Advanced demanding deeper conceptual application and multi-step problem solving beyond what Main tests.",
      pattern: "JEE Main runs across two sessions (January and April), computer-based, with the better score counting. Only top percentile scorers qualify for JEE Advanced, which decides admission to the IITs; JEE Main alone feeds NITs and IIITs.",
      tips: "Master NCERT thoroughly before jumping to advanced problem sets, since a large share of Main questions stay close to NCERT concepts. Keep a formula revision sheet per chapter and solve full-length mocks under strict timing.",
      cutoff: "JEE Main qualifying percentiles for JEE Advanced eligibility shift each year with the number of candidates and paper difficulty. NIT/IIIT admission cutoffs (via JoSAA) vary further by branch, institute, and category."
    },
    neet: {
      label: "NEET",
      exams: "NEET UG (Medical & Dental admissions)",
      syllabus: "Physics, Chemistry, and Biology (Botany and Zoology combined), drawn from the Class 11-12 NCERT syllabus, with Biology carrying the largest share of total marks.",
      pattern: "A single exam of 200 questions across all subjects, of which you attempt 180, in 3 hours 20 minutes. Each correct answer scores +4, each wrong answer costs -1, so unfamiliar guessing carries real risk.",
      tips: "Since Biology holds the most weight, prioritize NCERT line-by-line for Botany and Zoology. In Physics and Chemistry, build a bank of solved numericals and revisit diagrams and reactions regularly rather than only reading theory.",
      cutoff: "NEET qualifying percentiles and All India Rank cutoffs for specific colleges shift yearly with paper difficulty and seat availability. Government college cutoffs are typically far higher than private college cutoffs in the same state."
    }
  };

  var examOrder = ["banking","railway","upsc","ssc","jee","neet"];
  var currentExam = "banking";

  var quotes = [
    "Every topic you revise today is one less thing standing between you and your rank.",
    "Consistency beats intensity. An hour a day, every day, outperforms a weekend cram session.",
    "Mistakes in a mock test are cheap. Mistakes on exam day are expensive. Make them now.",
    "You don't need to feel ready. You need to show up and do the next question.",
    "Lakhs of aspirants started exactly where you are. The difference is who kept going after a bad week.",
    "Your syllabus doesn't care how you feel today. Open the book anyway, even for 20 minutes."
  ];

  function el(tag, cls, text){
    var e = document.createElement(tag);
    if(cls) e.className = cls;
    if(text !== undefined) e.textContent = text;
    return e;
  }

  function genSessionId(){
    var chars = "ABCDEFGHJKLMNPQRSTUVWXYZ0123456789";
    var s = "";
    for(var i=0;i<6;i++){ s += chars[Math.floor(Math.random()*chars.length)]; }
    return "EPM-" + s;
  }

  function buildTabs(){
    var wrap = document.getElementById("examTabs");
    wrap.innerHTML = "";
    examOrder.forEach(function(key){
      var btn = el("button", "exam-tab", KB[key].label);
      btn.setAttribute("data-key", key);
      if(key === currentExam) btn.classList.add("active");
      btn.addEventListener("click", function(){
        currentExam = key;
        document.getElementById("examField").textContent = KB[key].label;
        buildTabs();
        addBotMessage("Switched to " + KB[key].label + ". Covers " + KB[key].exams + ". Ask about syllabus, exam pattern, tips, cutoffs, or a study plan.");
      });
      wrap.appendChild(btn);
    });
  }

  function buildQuickActions(){
    var wrap = document.getElementById("quickActions");
    wrap.innerHTML = "";
    var actions = [
      ["Syllabus", "What's the syllabus?"],
      ["Exam Pattern", "What's the exam pattern?"],
      ["Tips", "Give me preparation tips"],
      ["Cutoffs", "What about cutoffs?"],
      ["Study Plan", "Make me a study plan for 8 weeks"],
      ["Motivate Me", "I need motivation"]
    ];
    actions.forEach(function(a){
      var chip = el("chip".replace("chip","button"), "chip", a[0]);
      chip.addEventListener("click", function(){ sendMessage(a[1]); });
      wrap.appendChild(chip);
    });
    var liveChip = el("button", "chip chip-live", "\uD83D\uDD34 Latest Notification");
    liveChip.addEventListener("click", function(){
      sendMessage("latest " + KB[currentExam].label + " notification result admit card 2026");
    });
    wrap.appendChild(liveChip);
  }

  function scrollToBottom(){
    var win = document.getElementById("chatWindow");
    win.scrollTop = win.scrollHeight;
  }

  function addMessage(text, sender){
    var win = document.getElementById("chatWindow");
    var msg = el("div", "msg " + sender);
    if(sender === "bot"){
      var seal = el("div", "seal", "AI");
      msg.appendChild(seal);
    }
    var bubble = el("div", "bubble", text);
    msg.appendChild(bubble);
    win.appendChild(msg);
    scrollToBottom();
  }

  function addBotMessage(text){ addMessage(text, "bot"); }
  function addUserMessage(text){ addMessage(text, "user"); }

  function addBotMessageHTML(html){
    var win = document.getElementById("chatWindow");
    var msg = el("div", "msg bot");
    var seal = el("div", "seal", "AI");
    msg.appendChild(seal);
    var bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.style.padding = "0";
    bubble.style.whiteSpace = "normal";
    bubble.innerHTML = html;
    msg.appendChild(bubble);
    win.appendChild(msg);
    scrollToBottom();
  }

  function addTyping(label){
    var win = document.getElementById("chatWindow");
    var msg = el("div", "msg bot");
    var seal = el("div", "seal", "AI");
    msg.appendChild(seal);
    var bubble = document.createElement("div");
    bubble.className = "typing-bubble";
    bubble.innerHTML = (label || "Searching the live web") +
      ' <span class="typing-dots"><span></span><span></span><span></span></span>';
    msg.appendChild(bubble);
    win.appendChild(msg);
    scrollToBottom();
    return msg;
  }

  function removeTyping(node){
    if(node && node.parentNode) node.parentNode.removeChild(node);
  }

  function matches(text, keywords){
    for(var i=0;i<keywords.length;i++){
      if(text.indexOf(keywords[i]) !== -1) return true;
    }
    return false;
  }

  function detectExamMention(text){
    for(var i=0;i<examOrder.length;i++){
      var key = examOrder[i];
      if(text.indexOf(key) !== -1) return key;
    }
    if(text.indexOf("bank") !== -1) return "banking";
    if(text.indexOf("rail") !== -1 || text.indexOf("rrb") !== -1) return "railway";
    if(text.indexOf("civil service") !== -1 || text.indexOf("ias") !== -1) return "upsc";
    if(text.indexOf("cgl") !== -1 || text.indexOf("chsl") !== -1) return "ssc";
    return null;
  }

  /* ============================================================
     LIVE WEB SEARCH ENGINE
     Free, keyless: Google News RSS -> rss2json.com JSON proxy.
     Triggers on notification/result/news-style questions so the
     mentor can surface real, current information alongside its
     built-in knowledge base answer.
     ============================================================ */
  var RSS2JSON = "https://api.rss2json.com/v1/api.json?rss_url=";
  var LIVE_TRIGGERS = [
    "latest","notification","news","update","2026","2027",
    "admit card","hall ticket","result","cutoff 2026","vacancy",
    "vacancies","apply","application","registration","exam date",
    "official","when is","recruitment","new update","current"
  ];

  function isLiveQuery(text){
    for(var i=0;i<LIVE_TRIGGERS.length;i++){
      if(text.indexOf(LIVE_TRIGGERS[i]) !== -1) return true;
    }
    return false;
  }

  function escapeHTML(s){
    return String(s || "")
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;");
  }

  function stripTags(s){
    return String(s || "").replace(/<[^>]+>/g,"").replace(/&nbsp;/g," ").trim();
  }

  function timeAgo(dateStr){
    try{
      var diff = Math.floor((Date.now() - new Date(dateStr)) / 60000);
      if(diff < 60) return diff + "m ago";
      if(diff < 1440) return Math.floor(diff/60) + "h ago";
      return Math.floor(diff/1440) + "d ago";
    }catch(e){ return ""; }
  }

  function liveSearch(query){
    var newsUrl = "https://news.google.com/rss/search?q=" +
      encodeURIComponent(query + " India 2026") + "&hl=en-IN&gl=IN&ceid=IN:en";
    var apiUrl = RSS2JSON + encodeURIComponent(newsUrl) + "&count=5";
    return fetch(apiUrl, { cache: "no-store" })
      .then(function(res){ return res.json(); })
      .then(function(data){
        if(data.status !== "ok" || !data.items) return [];
        return data.items.slice(0, 4);
      });
  }

  function renderLiveCards(items, query){
    var cards = items.map(function(item){
      var title = escapeHTML(stripTags(item.title)).slice(0, 130);
      var src = "";
      try{ src = new URL(item.link).hostname.replace("www.",""); }catch(e){ src = "source"; }
      return '<a class="lw-card" href="' + item.link + '" target="_blank" rel="noopener">' +
        '<div class="lw-title">' + title + '</div>' +
        '<div class="lw-meta"><span class="lw-src">' + escapeHTML(src) + '</span><span>&middot;</span><span>' + timeAgo(item.pubDate) + '</span></div>' +
        '</a>';
    }).join("");
    return '<div class="live-wire">' +
      '<div class="lw-head"><span class="live-dot"></span> LIVE &middot; "' + escapeHTML(query.slice(0,40)) + '"</div>' +
      '<div class="lw-list">' + cards + '</div>' +
      '<div class="lw-foot">Fetched live from Google News just now. Always confirm on the official exam website before acting.</div>' +
      '</div>';
  }

  function runLiveSearch(originalText, exam){
    var kb = KB[exam];
    var query = originalText.replace(/[?.!]/g,"").trim();
    if(query.split(" ").length < 3) query = kb.label + " " + query;
    var typingNode = addTyping("Searching live sources for \"" + kb.label + "\"");
    liveSearch(query).then(function(items){
      removeTyping(typingNode);
      if(items && items.length){
        addBotMessageHTML(renderLiveCards(items, query));
      }
      // silently skip if empty — the KB answer above still stands
    }).catch(function(){
      removeTyping(typingNode);
      addBotMessage("Live search is unavailable right now (offline, or the free search proxy is rate-limited). The answer above is from my built-in knowledge base — please verify on the official website for anything time-sensitive.");
    });
  }

  function buildStudyPlan(weeks, exam){
    var kb = KB[exam];
    var phases = [];
    var w = weeks;
    var foundation = Math.max(1, Math.round(w * 0.4));
    var practice = Math.max(1, Math.round(w * 0.35));
    var revision = Math.max(1, w - foundation - practice);
    phases.push("Weeks 1-" + foundation + ": Build foundation. Cover core " + kb.label + " topics end to end at least once, focusing on concepts over speed.");
    phases.push("Weeks " + (foundation+1) + "-" + (foundation+practice) + ": Practice phase. Daily sectional tests plus 2-3 full mocks a week, reviewing every wrong answer.");
    phases.push("Weeks " + (foundation+practice+1) + "-" + w + ": Revision phase. Rework your error log, revise formulas and current affairs, and taper mock frequency in the final few days.");
    return "Here's a " + w + "-week plan for " + kb.label + ":\n\n" + phases.join("\n\n");
  }

  function respond(rawText){
    var text = rawText.toLowerCase().trim();

    if(text === "") return "Type a question about syllabus, exam pattern, tips, cutoffs, or a study plan, and I'll help.";

    if(matches(text, ["hi","hello","hey"]) && text.length < 20){
      return "Hello. I'm set to " + KB[currentExam].label + " right now. Ask me about syllabus, exam pattern, prep tips, cutoffs, or a study plan, or switch exams using the tabs above.";
    }

    if(matches(text, ["thank"])){
      return "Happy to help. Keep going, one topic at a time.";
    }

    if(matches(text, ["what can you do","help me","how does this work"])){
      return "I can walk you through syllabus, exam pattern, prep tips, and cutoff trends for Banking, Railway, UPSC, SSC, JEE, and NEET. I can also sketch a study plan if you tell me how many weeks you have, or send a bit of motivation if you need it.";
    }

    var mentionedExam = detectExamMention(text);
    var exam = mentionedExam || currentExam;
    var kb = KB[exam];

    if(matches(text, ["motivat","demotivat","tired","giving up","stressed","anxious","exhausted","burnt out","burnout"])){
      return quotes[Math.floor(Math.random()*quotes.length)];
    }

    if(matches(text, ["study plan","schedule","timetable","plan for"])){
      var num = text.match(/\d+/);
      var unit = text.indexOf("day") !== -1 && text.indexOf("week") === -1 ? "days" : "weeks";
      if(!num){
        return "Tell me how many weeks you have left (for example, \"study plan for 8 weeks\") and I'll sketch a phase-by-phase plan for " + kb.label + ".";
      }
      var n = parseInt(num[0], 10);
      var weeks = unit === "days" ? Math.max(1, Math.round(n/7)) : n;
      return buildStudyPlan(weeks, exam);
    }

    if(matches(text, ["syllabus","topics","subjects","what to study","what should i study"])){
      return kb.syllabus;
    }

    if(matches(text, ["pattern","stages","structure","marking scheme","sections","how many papers","exam format"])){
      return kb.pattern;
    }

    if(matches(text, ["cutoff","cut off","score needed","previous year cutoff"])){
      return kb.cutoff;
    }

    if(matches(text, ["tip","how to prepare","strategy","crack","advice","how do i prepare"])){
      return kb.tips;
    }

    if(mentionedExam && mentionedExam !== currentExam){
      currentExam = mentionedExam;
      document.getElementById("examField").textContent = KB[mentionedExam].label;
      buildTabs();
      return "Switched to " + kb.label + " (covers " + kb.exams + "). Ask about syllabus, exam pattern, tips, cutoffs, or a study plan.";
    }

    return "I can help with syllabus, exam pattern, prep tips, cutoffs, or a study plan for " + kb.label + ". Try one of the quick-action chips below, or ask directly.";
  }

  function sendMessage(text){
    if(!text) return;
    addUserMessage(text);
    var lower = text.toLowerCase().trim();
    var exam = detectExamMention(lower) || currentExam;
    var reply = respond(text);
    setTimeout(function(){
      addBotMessage(reply);
      if(isLiveQuery(lower)){
        setTimeout(function(){ runLiveSearch(text, exam); }, 200);
      }
    }, 250);
  }

  document.getElementById("sendBtn").addEventListener("click", function(){
    var input = document.getElementById("chatInput");
    var text = input.value.trim();
    if(text === "") return;
    sendMessage(text);
    input.value = "";
  });

  document.getElementById("chatInput").addEventListener("keydown", function(e){
    if(e.key === "Enter"){
      document.getElementById("sendBtn").click();
    }
  });

  document.getElementById("sessionField").textContent = genSessionId();
  buildTabs();
  buildQuickActions();
  addBotMessage("Welcome. I'm your exam prep mentor, currently set to Banking (SBI PO/Clerk, IBPS PO/Clerk/RRB, RBI Grade B). Switch exams with the tabs above, or ask about syllabus, exam pattern, tips, cutoffs, or a study plan. Ask about \"latest notification\" or tap the red chip below and I'll pull real, live results from the web too.");

})();
</script>
